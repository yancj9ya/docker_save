name: 批量打包 Docker 镜像 (离线安装版)

on:
  push:
    paths:
      - 'images.txt'      # 只有当你修改镜像列表时才触发
      - '.github/workflows/*.yml'
  workflow_dispatch:      # 允许你在 GitHub 页面手动点击按钮触发

jobs:
  build-and-save:
    runs-on: ubuntu-latest
    
    # 提前适配 Node.js 24，消除你看到的那个黄色警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 检查镜像清单是否存在
        run: |
          if [ ! -f images.txt ]; then
            echo "错误: 根目录下找不到 images.txt 文件！"
            exit 1
          fi

      - name: 拉取镜像并打包 (Pull & Save)
        run: |
          mkdir -p ./docker-outputs
          # 逐行读取 images.txt，忽略空行和注释
          grep -v '^#' images.txt | grep -v '^$' | while IFS= read -r line || [ -n "$line" ]; do
            # 去除可能存在的 Windows 换行符 \r
            image=$(echo "$line" | tr -d '\r')
            echo "------------------------------------------"
            echo "正在处理: $image"
            
            # 执行拉取
            docker pull "$image"
            
            # 生成文件名：将斜杠和冒号替换为下划线
            safe_name=$(echo "$image" | tr '/' '_' | tr ':' '_')
            
            # 执行打包
            docker save "$image" -o "./docker-outputs/${safe_name}.tar"
            echo "已完成打包: ${safe_name}.tar"
          done

      - name: 压缩并上传产物 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: all-docker-images
          path: ./docker-outputs/*.tar
          retention-days: 1  # 产物保留1天，节省你的 GitHub 空间
